name: Laravel application (Mysql)
run-name: Build, Push and Deploy image simple social media

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: "${{ secrets.DOCKER_USER }}/agnes-simple-social-media"
  DOCKER_USER: "${{ secrets.DOCKER_USER }}"

jobs:

  run-mysql-in-docker:
    runs-on: self-hosted
    steps:
      - name: Cleanup old containers (safe)
        run: |
          docker rm -f mysql || true

      - name: Running mysql in container
        run: |
          docker run -d \
            --name mysql \
            -e MYSQL_ROOT_PASSWORD=password \
            -e MYSQL_DATABASE=social_media \
            -p 3307:3306 \
            mysql:5.7

      - name: List docker container
        run: docker ps -a


  build-push-image:
    needs: run-mysql-in-docker
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t $IMAGE_NAME .

      - name: List Image
        run: docker image ls

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Image
        run: docker push $IMAGE_NAME


  deploy-social-media:
    needs: build-push-image
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Stop existing containers safely
        run: docker compose down || true

      - name: Start container
        run: docker compose up -d

      - name: Cleanup docker space
        run: docker system prune -f
